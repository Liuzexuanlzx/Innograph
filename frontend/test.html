<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InnoGraph Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(180deg, #f4f8f7 0%, #e7eeed 100%);
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        text-align: center;
      }
      .title {
        font-size: 2.5rem;
        color: #23343b;
        margin-bottom: 1rem;
      }
      .subtitle {
        color: #5f737b;
        margin-bottom: 2rem;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #23343b;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #3a5056;
      }
      .status {
        margin-top: 2rem;
        padding: 1rem;
        border-radius: 8px;
        background: white;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }
      .loading {
        color: #5f737b;
      }
      .success {
        color: #16a34a;
      }
      .error {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">InnoGraph Test</h1>
      <p class="subtitle">Test if frontend and backend are working</p>
      
      <button class="btn" onclick="startTest()">Test Connection</button>
      
      <div id="status" class="status" style="display: none;">
        <div id="statusText"></div>
      </div>
    </div>

    <script>
      async function startTest() {
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        
        statusDiv.style.display = 'block';
        statusText.className = 'loading';
        statusText.innerHTML = 'Testing backend connection...';
        
        try {
          const response = await fetch('/api/v1/graph/build', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: 'Attention Is All You Need', max_papers: 10 })
          });
          
          if (response.ok) {
            const data = await response.json();
            statusText.className = 'success';
            statusText.innerHTML = `✅ Backend connected! Task ID: ${data.task_id}`;
          } else {
            statusText.className = 'error';
            statusText.innerHTML = `❌ Backend error: ${response.status}`;
          }
        } catch (error) {
          statusText.className = 'error';
          statusText.innerHTML = `❌ Connection failed: ${error.message}`;
        }
      }
    </script>
  </body>
</html>
